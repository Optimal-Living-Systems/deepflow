services:
  # ─── Deep Flo Runtime ──────────────────────────────────────
  # Runs Deep Agents in an isolated environment with LangChain 1.x
  deep-flo-runtime:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.runtime
    container_name: deep-flo-runtime
    ports:
      - "${DEEP_FLO_PORT:-8100}:8100"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEEP_FLO_MODEL=${DEEP_FLO_MODEL:-anthropic:claude-sonnet-4-20250514}
      - DEEP_FLO_PORT=8100
      - DEEP_FLO_MAX_STEPS=${DEEP_FLO_MAX_STEPS:-50}
      - DEEP_FLO_TIMEOUT=${DEEP_FLO_TIMEOUT:-300}
      - DEEP_FLO_LOG_LEVEL=${DEEP_FLO_LOG_LEVEL:-INFO}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-deep-flo}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - deep-flo-net

  # ─── Langflow ──────────────────────────────────────────────
  # Visual workflow designer — connects to runtime over HTTP
  langflow:
    image: langflowai/langflow:latest
    container_name: deep-flo-langflow
    ports:
      - "${LANGFLOW_PORT:-7860}:7860"
    environment:
      - LANGFLOW_AUTO_LOGIN=true
      - LANGFLOW_REMOVE_API_KEYS=false
      - LANGFLOW_COMPONENTS_PATH=/app/custom_components
    volumes:
      # Mount custom Deep Flo component into Langflow
      - ../langflow_components:/app/custom_components:ro
      # Mount example flows for easy import
      - ../examples/langflow:/app/flows:ro
      # Persist Langflow data across restarts
      - langflow-data:/app/langflow
    depends_on:
      deep-flo-runtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7860/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - deep-flo-net

volumes:
  langflow-data:

networks:
  deep-flo-net:
    driver: bridge
