services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: langflow
      POSTGRES_PASSWORD: langflow
      POSTGRES_DB: langflow_stack
    ports:
      - "${LANGFLOW_POSTGRES_PORT:-55433}:5432"
    volumes:
      - langflow-postgres-stack:/var/lib/postgresql/data

  deep-flo-runtime:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.deep-flo
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DEEP_FLO_HOST: 0.0.0.0
      DEEP_FLO_PORT: 8011
      DEEP_FLO_HOME_DIR: /app
    ports:
      - "8011:8011"
    depends_on:
      - postgres

  deep-flo-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.deep-flo
    restart: unless-stopped
    env_file:
      - ../.env
    command: ["uv", "run", "deep-flo", "mcp", "--transport", "streamable-http", "--host", "0.0.0.0", "--port", "8012"]
    environment:
      DEEP_FLO_HOME_DIR: /app
    ports:
      - "8012:8012"
    depends_on:
      - postgres

  langflow:
    image: langflowai/langflow:1.8.1
    restart: unless-stopped
    user: "0:0"
    ports:
      - "7860:7860"
    depends_on:
      - postgres
      - deep-flo-runtime
      - deep-flo-mcp
    environment:
      LANGFLOW_DATABASE_URL: postgresql://langflow:langflow@postgres:5432/langflow_stack
      LANGFLOW_CONFIG_DIR: /app/langflow
      LANGFLOW_COMPONENTS_PATH: /app/deep-flo_components
      DEEP_FLO_RUNTIME_URL: http://deep-flo-runtime:8011
    volumes:
      - langflow-data-stack:/app/langflow
      - ../langflow_components:/app/deep-flo_components:ro

volumes:
  langflow-postgres-stack:
  langflow-data-stack:
