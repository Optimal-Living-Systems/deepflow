name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv venv .venv-runtime
          source .venv-runtime/bin/activate
          uv pip install -e ".[runtime,dev]"

      - name: Run ruff linter
        run: |
          source .venv-runtime/bin/activate
          ruff check src/ langflow_components/ tests/

      - name: Run ruff formatter check
        run: |
          source .venv-runtime/bin/activate
          ruff format --check src/ langflow_components/ tests/

  test-runtime:
    name: Runtime Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv venv .venv-runtime
          source .venv-runtime/bin/activate
          uv pip install -e ".[runtime,dev]"

      - name: Run runtime tests
        run: |
          source .venv-runtime/bin/activate
          pytest tests/test_runtime.py -v --tb=short
        env:
          DEEP_FLO_MODEL: "mock"

  test-components:
    name: Component Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv venv .venv-components
          source .venv-components/bin/activate
          uv pip install -e ".[langflow-dev]"

      - name: Run component tests
        run: |
          source .venv-components/bin/activate
          pytest tests/test_components.py -v --tb=short

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [test-runtime, test-components]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.runtime
          push: false
          tags: deep-flo-runtime:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify runtime starts
        run: |
          docker run -d --name test-runtime \
            -e DEEP_FLO_MODEL=mock \
            -p 8100:8100 \
            deep-flo-runtime:test
          
          # Wait for startup
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8100/health > /dev/null 2>&1; then
              echo "Runtime healthy"
              break
            fi
            echo "Waiting for runtime... ($i/30)"
            sleep 1
          done
          
          # Verify health endpoint
          curl -sf http://localhost:8100/health | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'healthy', f'Unexpected status: {data[\"status\"]}'
          print('Health check passed')
          "
          
          docker stop test-runtime
